services:
  postgres:
    image: postgres:17.5-bookworm
    environment:
      POSTGRES_DB: identity
      POSTGRES_USER: identity
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identity -d identity"]
      interval: 2s
      timeout: 3s
      retries: 20
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - identity-postgres:/var/lib/postgresql/data

  migrate:
    build: .
    entrypoint: ["/usr/local/bin/migrate"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env}
      DEPLOYMENT_ENVIRONMENT: ${DEPLOYMENT_ENVIRONMENT:-development}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  identity:
    build: .
    environment:
      HTTP_ADDR: :8080
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env}
      WORKLOADS_JSON: ${WORKLOADS_JSON:?set WORKLOADS_JSON in .env}
      PRODUCTS_JSON: ${PRODUCTS_JSON:?set PRODUCTS_JSON in .env}
      PAIRWISE_ID_KEY_BASE64: ${PAIRWISE_ID_KEY_BASE64:?set PAIRWISE_ID_KEY_BASE64 in .env}
      EMAIL_KEY_PROVIDER: ${EMAIL_KEY_PROVIDER:-local}
      EMAIL_LOCAL_KEKS_JSON: ${EMAIL_LOCAL_KEKS_JSON:-}
      EMAIL_YC_KMS_KEYS_JSON: ${EMAIL_YC_KMS_KEYS_JSON:-}
      EMAIL_KEY_ACTIVE_ID: ${EMAIL_KEY_ACTIVE_ID:?set EMAIL_KEY_ACTIVE_ID in .env}
      BLIND_INDEX_KEYS_JSON: ${BLIND_INDEX_KEYS_JSON:?set BLIND_INDEX_KEYS_JSON in .env}
      BLIND_INDEX_CURRENT_VERSION: ${BLIND_INDEX_CURRENT_VERSION:?set BLIND_INDEX_CURRENT_VERSION in .env}
      TOKEN_SIGNING_KEYS_JSON: ${TOKEN_SIGNING_KEYS_JSON:?set TOKEN_SIGNING_KEYS_JSON in .env}
      TOKEN_ACTIVE_KEY_ID: ${TOKEN_ACTIVE_KEY_ID:?set TOKEN_ACTIVE_KEY_ID in .env}
      TOKEN_ISSUER: ${TOKEN_ISSUER:?set TOKEN_ISSUER in .env}
      TOKEN_TTL: ${TOKEN_TTL:-5m}
      TOKEN_MAX_TTL: ${TOKEN_MAX_TTL:-15m}
      MINOR_CROSS_PRODUCT_LINKING_ENABLED: ${MINOR_CROSS_PRODUCT_LINKING_ENABLED:-false}
      REQUIRE_OUTBOX_DELIVERY: ${REQUIRE_OUTBOX_DELIVERY:-false}
      OUTBOX_DELIVERY_URL: ${OUTBOX_DELIVERY_URL:-}
      OUTBOX_POLL_INTERVAL: ${OUTBOX_POLL_INTERVAL:-2s}
      OUTBOX_MAX_ATTEMPTS: ${OUTBOX_MAX_ATTEMPTS:-12}
      OUTBOX_READINESS_MAX_AGE: ${OUTBOX_READINESS_MAX_AGE:-5m}
      EMAIL_VERIFICATION_TTL: ${EMAIL_VERIFICATION_TTL:-15m}
      EMAIL_VERIFICATION_CLEANUP_INTERVAL: ${EMAIL_VERIFICATION_CLEANUP_INTERVAL:-1m}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:8080:8080"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

volumes:
  identity-postgres:
