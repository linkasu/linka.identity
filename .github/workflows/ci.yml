name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      ydb:
        image: cr.yandex/yc/yandex-docker-local-ydb@sha256:5ffb7860784d5517f60b6cf9fdf641b964395ed642d818e2b3d892259e155af9
        env:
          YDB_USE_IN_MEMORY_PDISKS: true
          YDB_DEFAULT_LOG_LEVEL: NOTICE
          GRPC_PORT: 2136
          MON_PORT: 8765
        ports:
          - 2136:2136
          - 8765:8765
    env:
      TEST_YDB_ENDPOINT: grpc://127.0.0.1:2136
      TEST_YDB_DATABASE: /local
      YDB_ANONYMOUS_CREDENTIALS: 1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Wait for official local YDB
        run: |
          for attempt in $(seq 1 60); do
            curl --fail --silent http://127.0.0.1:8765/ >/dev/null && exit 0
            sleep 2
          done
          exit 1
      - run: go test -race ./...
      - run: go test -tags=integration ./...
      - run: go vet ./...
      - run: go build ./...
      - run: sh -n staging-preflight.sh
